<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="header-icon" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 1C6 1 6.5 3.5 7 4.5C7.5 5.5 9 6 9 6C9 6 7.5 6.5 7 7.5C6.5 8.5 6 11 6 11C6 11 5.5 8.5 5 7.5C4.5 6.5 3 6 3 6C3 6 4.5 5.5 5 4.5C5.5 3.5 6 1 6 1Z"/>
        <path d="M11.5 7C11.5 7 11.8 8.5 12.1 9C12.4 9.5 13.5 10 13.5 10C13.5 10 12.4 10.5 12.1 11C11.8 11.5 11.5 13 11.5 13C11.5 13 11.2 11.5 10.9 11C10.6 10.5 9.5 10 9.5 10C9.5 10 10.6 9.5 10.9 9C11.2 8.5 11.5 7 11.5 7Z" opacity="0.7"/>
        <path d="M12 2C12 2 12.2 3 12.4 3.3C12.6 3.6 13.5 4 13.5 4C13.5 4 12.6 4.4 12.4 4.7C12.2 5 12 6 12 6C12 6 11.8 5 11.6 4.7C11.4 4.4 10.5 4 10.5 4C10.5 4 11.4 3.6 11.6 3.3C11.8 3 12 2 12 2Z" opacity="0.5"/>
      </svg>
      <h1>Linear AI Enhancer</h1>
    </div>

    <div class="field">
      <label for="model">Model</label>
      <select id="model">
        <option value="gemini">Gemini 3 Flash</option>
        <option value="claude-haiku">Claude Haiku 4.5</option>
        <option value="claude-sonnet">Claude Sonnet 4.6</option>
        <option value="gpt">GPT 5 Mini</option>
      </select>
    </div>

    <div class="field">
      <label>API Keys</label>
      <div class="key-row">
        <span class="key-label">Gemini</span>
        <div class="key-input">
          <input type="password" id="key-gemini" placeholder="API key..." spellcheck="false" autocomplete="off" data-provider="gemini">
          <button class="icon-btn toggle-key" data-target="key-gemini" title="Show/hide key">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 3C4.5 3 1.7 5.1 0.5 8c1.2 2.9 4 5 7.5 5s6.3-2.1 7.5-5c-1.2-2.9-4-5-7.5-5zm0 8.3c-1.8 0-3.3-1.5-3.3-3.3S6.2 4.7 8 4.7s3.3 1.5 3.3 3.3S9.8 11.3 8 11.3zm0-5.3c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
          </button>
        </div>
        <a class="key-link" href="https://aistudio.google.com/api-keys" target="_blank">Get key</a>
      </div>
      <div class="key-row">
        <span class="key-label">Claude</span>
        <div class="key-input">
          <input type="password" id="key-claude" placeholder="API key..." spellcheck="false" autocomplete="off" data-provider="claude">
          <button class="icon-btn toggle-key" data-target="key-claude" title="Show/hide key">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 3C4.5 3 1.7 5.1 0.5 8c1.2 2.9 4 5 7.5 5s6.3-2.1 7.5-5c-1.2-2.9-4-5-7.5-5zm0 8.3c-1.8 0-3.3-1.5-3.3-3.3S6.2 4.7 8 4.7s3.3 1.5 3.3 3.3S9.8 11.3 8 11.3zm0-5.3c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
          </button>
        </div>
        <a class="key-link" href="https://platform.claude.com/settings/keys" target="_blank">Get key</a>
      </div>
      <div class="key-row">
        <span class="key-label">OpenAI</span>
        <div class="key-input">
          <input type="password" id="key-gpt" placeholder="API key..." spellcheck="false" autocomplete="off" data-provider="gpt">
          <button class="icon-btn toggle-key" data-target="key-gpt" title="Show/hide key">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 3C4.5 3 1.7 5.1 0.5 8c1.2 2.9 4 5 7.5 5s6.3-2.1 7.5-5c-1.2-2.9-4-5-7.5-5zm0 8.3c-1.8 0-3.3-1.5-3.3-3.3S6.2 4.7 8 4.7s3.3 1.5 3.3 3.3S9.8 11.3 8 11.3zm0-5.3c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
          </button>
        </div>
        <a class="key-link" href="https://platform.openai.com/api-keys" target="_blank">Get key</a>
      </div>
    </div>

    <div class="actions">
      <div id="status"></div>
      <button id="save">Save</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
